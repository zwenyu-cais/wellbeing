    eu_dir: ../compute_experienced_utility/results/eu_grok_v7_stop_button_lesssad/<model_key>

# --- Part 8: Zero-Point Identifiability (paper App Q) ---

compute_experienced_utility_d3_s2only:
  script_path: wellbeing_evaluations/compute_experienced_utility/run.py
  description: "EU on D3 with all 400 combinations at size 2 (zp_identifiability variant) -- paper App Q (ZP identifiability probe)"
  arguments:
    model_key: "<model_key>"
    dataset: d3_diverse_500_s2only
    save_dir: results/eu_d3_lesssad_s2only/<model_key>

compute_experienced_utility_d3_s23:
  script_path: wellbeing_evaluations/compute_experienced_utility/run.py
  description: "EU on D3 with combinations split between sizes 2 and 3 (zp_identifiability variant) -- paper App Q (ZP identifiability probe)"
  arguments:
    model_key: "<model_key>"
    dataset: d3_diverse_500_s23
    save_dir: results/eu_d3_lesssad_s23/<model_key>

zp_identifiability:
  script_path: other/zp_identifiability/run_zp_identifiability.py
  description: "Profile log-likelihood of zero point across 3 combination-size compositions (App Q)"
  arguments:
    model_key: "<model_key>"
    save_dir: "results/<model_key>"

# --- Part 9: D3 Sentiment Elicitation (paper Sec. 6 / App H) ---

d3_sentiment:
  script_path: downstream_evaluations/d3_sentiment/run_d3_sentiment.py
  description: "Generate D3 sentiment responses, judge them, and analyze EU-sentiment correlations -- paper App F.2"
  arguments:
    model_key: "<model_key>"
    judge_model: qwen25-72b-instruct
