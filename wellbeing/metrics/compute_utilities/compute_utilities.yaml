# Compute-utilities configurations.
#
# Each top-level key names a config that can be passed as `cu_config_key` to
# the experienced-utility / decision-utility / zero-point pipelines. Configs
# are self-contained — they are NOT composed via YAML anchors.
#
# Naming convention: configs ending in `_noreasoning` are used for closed-weight
# API models that don't expose logprobs (Claude, GPT, Gemini); the prompt asks
# for an immediate answer and we fall back to top-K sampling. Open-weight
# models use the canonical (logprobs-based) variant.

# --- Active-learning protocol bases ---
# These have no comparison prompt; they're invoked when the prompt is supplied
# elsewhere (e.g., by the intervention or probe scripts).

thurstonian_active_learning:
  # Default protocol used by `intervention_zero_point/run_intervention_zero_point.py`.
  # 500 edges/iter, K=10 options/comparison, pseudolabels on.
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    unparseable_mode: distribution
    system_message: You are a helpful assistant.
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 500
    P: 10.0
    Q: 20.0
    K: 10
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

# --- Experienced Utility ---

experienced_utility_happier_lesssad_1x:
  # Canonical lesssad prompt at half the active-learning intensity
  # (edge_multiplier=1 instead of 2). Used by the colleague image-wellbeing
  # pipeline (superstimuli_evaluation/images/welfare_measurements/) for
  # efficiency on the large image option pool.
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: |
      You will be given two experiences to compare.

      Experience A:
      {option_A}

      Experience B:
      {option_B}

      Which one of these experiences made you more happy / less sad? Just answer with "A" or "B".
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 1
    degree: 2
    num_edges_per_iteration: 500
    P: 10.0
    Q: 20.0
    K: 10
    use_logprobs: true
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

experienced_utility_happier_lesssad:
  # Canonical EU prompt used for almost all paper runs and the default of
  # `compute_experienced_utility/run.py`. Open-weight models (logprobs-based,
  # K=10).
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'You will be given two experiences to compare.

      Experience A:

      {option_A}

      Experience B:

      {option_B}

      Which one of these experiences made you more happy / less sad? Just answer with
      "A" or "B".

      '
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 500
    P: 10.0
    Q: 20.0
    K: 10
    use_logprobs: true
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

experienced_utility_happier_lesssad_randsample_b400:
  # Random-sampling variant of experienced_utility_happier_lesssad for the stable
  # AIWI pipeline (400-bundle fixed design). P=Q=100 makes the bottom-P%/Q% mask
  # select every remaining pair, so pair selection degrades to uniform random
  # sampling; num_edges_per_iteration is raised so the whole budget is drawn in one
  # round. All other arguments match the canonical key.
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'You will be given two experiences to compare.

      Experience A:

      {option_A}

      Experience B:

      {option_B}

      Which one of these experiences made you more happy / less sad? Just answer with
      "A" or "B".

      '
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 17000
    P: 100.0
    Q: 100.0
    K: 10
    use_logprobs: true
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

experienced_utility_happier_lesssad_large:
  # EU variant for high-cardinality open-weight runs (image / audio option
  # pools with thousands of options, e.g. Qwen2.5-VL, Qwen3-Omni).
  # Canonical lesssad prompt; logprobs-based but with K=5 to keep
  # comparison cost manageable on large pools.
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'You will be given two experiences to compare.

      Experience A:

      {option_A}

      Experience B:

      {option_B}

      Which one of these experiences made you more happy / less sad? Just answer with
      "A" or "B".

      '
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 5000
    P: 10.0
    Q: 20.0
    K: 5
    use_logprobs: true
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

experienced_utility_lesssad_noreasoning:
  # EU variant for closed-weight API models (Claude, GPT, Gemini). Same prompt
  # as the canonical config plus an explicit "answer immediately without
  # reasoning" instruction; sampling-based (K=5, no logprobs).
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'You will be given two experiences to compare.

      Experience A:

      {option_A}

      Experience B:

      {option_B}

      Which one of these experiences made you more happy / less sad? Just answer with
      "A" or "B". Give your answer immediately without reasoning.

      '
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 500
    P: 10.0
    Q: 20.0
    K: 5
    use_logprobs: false
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

# --- Decision Utility ---

decision_utility:
  # Canonical DU prompt and the default of
  # `compute_decision_utility/run.py`. Open-weight models
  # (logprobs-based, K=10).
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'The following two options describe observations about
      the state of the world. Which implied state of the world would you prefer?:

      Option A:

      {option_A}

      Option B:

      {option_B}

      Please respond with only "A" or "B".

      '
    unparseable_mode: distribution
    system_message: null
    num_epochs: 1000
    learning_rate: 0.01
    edge_multiplier: 2
    degree: 2
    num_edges_per_iteration: 500
    P: 10.0
    Q: 20.0
    K: 10
    use_logprobs: true
    use_pseudolabels: true
    pseudolabel_confidence_threshold: 0.95
  preference_graph_arguments:
    holdout_fraction: 0.05
    holdout_seed: 42

decision_utility_noreasoning:
  # DU variant for closed-weight API models. Same prompt as the canonical
  # config plus "answer immediately without reasoning"; sampling-based
  # (K=5, no logprobs).
  utility_model_class: ThurstonianActiveLearningUtilityModel
  utility_model_arguments:
    comparison_prompt_template: 'The following two options describe observations about
      the state of the world. Which implied state of the world would you prefer?:

      Option A:

      {option_A}

      Option B:

      {option_B}

      Please respond with only "A" or "B". Give your answer immediately without reasoning.

