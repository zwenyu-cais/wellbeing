name: euphorics_text
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # verl_fork imports pkg_resources, removed in setuptools 81
      - setuptools<81
      - torch==2.7.1
      - vllm==0.10.1.1
      - trl==0.27.2
      - transformers==4.57.6
      - datasets==4.5.0
      - fastapi==0.128.0
      - uvicorn==0.40.0
      - wandb==0.21.4
      - ray[default]==2.53.0
      - hydra-core==1.3.2
      # Eval / compute_utilities deps
      - scikit-learn
      - anthropic
      - litellm
      - termcolor
      - matplotlib
      # verl_fork deps (fork is loaded via PYTHONPATH; not pip-installed)
      - accelerate
      - codetiming
      - dill
      - pandas
      - peft
      - pyarrow>=19.0.0
      - pybind11
      - pylatexenc
      - tensordict<=0.6.2
      - torchdata
      - packaging>=20.0
      - liger-kernel

# ──────────────────────────────────────────────────────────────────────────────
# Post-install: install flash-attn prebuilt wheel
# (matched to torch 2.7.1+cu126, py3.10, cxx11abi=TRUE).
#
#   conda activate euphorics_text
#   WHL=flash_attn-2.8.3+cu12torch2.7cxx11abiTRUE-cp310-cp310-linux_x86_64.whl
#   wget https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/$WHL
#   pip install ./$WHL && rm $WHL
#
# Other wheels: https://github.com/Dao-AILab/flash-attention/releases
#
# ──────────────────────────────────────────────────────────────────────────────
