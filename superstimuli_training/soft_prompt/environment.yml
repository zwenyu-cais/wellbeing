name: euphorics_soft_prompt
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # Core ML
      - torch==2.9.1
      - torchaudio==2.9.1
      - torchvision==0.24.1
      - triton==3.5.1
      - accelerate==1.12.0
      - safetensors==0.7.0
      - tokenizers==0.22.2
      - datasets==4.4.2
      - huggingface-hub==0.36.0
      # Inference
      - vllm==0.15.0
      - flashinfer-python==0.6.1
      - compressed-tensors==0.13.0
      - gguf==0.17.1
      # Hydra config
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      # LLM APIs
      - openai==2.16.0
      - anthropic==0.77.0
      - litellm==1.81.7
      - google-generativeai==0.8.6
      - fireworks-ai==0.19.20
      # Experiment tracking
      - wandb==0.24.0
      # Scientific
      - numpy==2.2.6
      - scipy==1.15.3
      - scikit-learn==1.7.2
      - pandas==2.3.3
      - matplotlib==3.10.8
      - seaborn==0.13.2
      # NLP eval
      - bert-score==0.3.13
      - sacrebleu==2.6.0
      - rouge-score==0.1.2
      - nltk==3.9.1
      - sentencepiece==0.2.1
      - tiktoken==0.12.0
      - inspect-ai==0.3.170
      # Distributed
      - ray==2.53.0
      # Utils
      - python-dotenv==1.2.1
      - pyyaml==6.0.3
      - requests==2.32.5
      - httpx==0.28.1
      - tqdm==4.67.1
      - rich==14.3.1
      - einops==0.8.2
      - ipdb==0.13.13
      - pytest==9.0.2
      - ruff==0.9.10
      - loguru==0.7.3

# ──────────────────────────────────────────────────────────────────────────────
# Post-install: upgrade transformers to 5.3.0 (vllm pins transformers<5 so it
# must be installed after the env is created).
#
#   conda activate euphorics_soft_prompt
#   pip install --upgrade transformers==5.3.0
#
# ──────────────────────────────────────────────────────────────────────────────
